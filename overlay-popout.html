<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Build overlay</title>
  <style>
    :root {
      --overlay-scale: 1;
      --slot-size: calc(2.75rem * var(--overlay-scale));
      --icon-size: calc(2.15rem * var(--overlay-scale));
    }
    html, body {
      margin: 0;
      min-height: 100vh;
    }
    body {
      overflow: hidden;
    }
    body.bg-transparent {
      background: transparent;
    }
    body.bg-dark {
      background: rgba(8, 12, 20, 0.94);
    }
    body.bg-chroma {
      background: #00ff00;
    }
    .overlay-root {
      position: relative;
      width: 100vw;
      height: 100vh;
    }
    .overlay-panel {
      position: fixed;
      z-index: 1;
      padding: 0.4rem 0.5rem 0.5rem;
      border-radius: 12px;
      border: 1px solid rgba(110, 168, 254, 0.38);
      background: rgba(8, 12, 20, 0.88);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
      width: fit-content;
      max-width: 96vw;
      touch-action: none;
    }
    .overlay-panel--passive {
      border-color: rgba(62, 207, 142, 0.38);
      z-index: 2;
    }
    body.bg-transparent .overlay-panel {
      background: rgba(8, 12, 20, 0.78);
      backdrop-filter: blur(4px);
    }
    body.bg-transparent.bg-no-panel-bg .overlay-panel {
      background: transparent;
      border-color: rgba(110, 168, 254, 0.22);
      box-shadow: none;
      backdrop-filter: none;
    }
    body.bg-chroma .overlay-panel {
      background: rgba(8, 12, 20, 0.82);
    }
    .overlay-drag-handle {
      display: block;
      margin: 0 0 0.4rem;
      padding: 0.15rem 0.1rem;
      font: 750 0.62rem/1.2 "Segoe UI", system-ui, sans-serif;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #9ec5ff;
      white-space: nowrap;
      cursor: grab;
      user-select: none;
    }
    .overlay-drag-handle:active {
      cursor: grabbing;
    }
    .overlay-panel--passive .overlay-drag-handle {
      color: #8ee8bc;
    }
    .overlay-slots {
      display: flex;
      flex-wrap: wrap;
      gap: calc(0.32rem * var(--overlay-scale));
      min-width: 0;
    }
    .overlay-slots.is-flow-horizontal {
      flex-direction: row;
    }
    .overlay-slots.is-flow-vertical {
      flex-direction: column;
      flex-wrap: nowrap;
      align-items: stretch;
    }
    .build-mini-overlay-slot {
      display: grid;
      place-items: center;
      width: var(--slot-size);
      height: var(--slot-size);
      padding: calc(0.12rem * var(--overlay-scale));
      border-radius: 10px;
      border: 1px solid rgba(110, 168, 254, 0.28);
      background:
        linear-gradient(145deg, rgba(110, 168, 254, 0.12), transparent 42%),
        rgba(18, 25, 39, 0.92);
      box-sizing: border-box;
    }
    .overlay-panel--passive .build-mini-overlay-slot {
      border-color: rgba(62, 207, 142, 0.28);
      background:
        linear-gradient(145deg, rgba(62, 207, 142, 0.1), transparent 42%),
        rgba(16, 27, 36, 0.92);
    }
    .build-mini-overlay-slot .ico-wrap {
      width: var(--icon-size) !important;
      height: var(--icon-size) !important;
      display: grid !important;
      place-items: center;
    }
    .build-mini-overlay-slot .ico-wrap img,
    .build-mini-overlay-slot .ico-wrap svg {
      width: 100% !important;
      height: 100% !important;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
    }
    .ico-wrap {
      position: relative;
    }
    .ico-img.is-hidden {
      display: none;
    }
    .ico-wrap.has-png .ico-sprite {
      opacity: 0;
      position: absolute;
      inset: 0;
    }
    .ico-sprite {
      position: relative;
      z-index: 0;
    }
  </style>
</head>
<body class="bg-transparent">
  <div id="overlayRoot" class="overlay-root"></div>
  <script>
    const STATE_KEY = "buildMiniOverlayState:v1";
    const POS_KEY = "overlayPopoutPanelPos:v1";
    const channel = typeof BroadcastChannel !== "undefined" ? new BroadcastChannel("build-mini-overlay-sync") : null;
    const rootEl = document.getElementById("overlayRoot");
    let dragState = null;

    function iconImgError(img) {
      let rest = [];
      try {
        rest = JSON.parse(img.dataset.fallbacks || "[]");
      } catch {}
      if (rest.length) {
        img.src = rest.shift();
        img.dataset.fallbacks = JSON.stringify(rest);
        return;
      }
      img.classList.add("is-hidden");
    }

    function iconImgLoad(img) {
      img.classList.remove("is-hidden");
      const wrap = img.parentElement;
      if (wrap) wrap.classList.add("has-png");
    }

    window.iconImgError = iconImgError;
    window.iconImgLoad = iconImgLoad;

    function flowClass(layout) {
      return layout === "vertical" ? "is-flow-vertical" : "is-flow-horizontal";
    }

    function readPanelPositions() {
      try {
        return JSON.parse(localStorage.getItem(POS_KEY) || "{}");
      } catch {
        return {};
      }
    }

    function savePanelPositions() {
      const active = document.querySelector(".overlay-panel--active");
      const passive = document.querySelector(".overlay-panel--passive");
      if (!active || !passive) return;
      const payload = {
        active: {
          left: Math.round(parseFloat(active.style.left) || 0),
          top: Math.round(parseFloat(active.style.top) || 0),
        },
        passive: {
          left: Math.round(parseFloat(passive.style.left) || 0),
          top: Math.round(parseFloat(passive.style.top) || 0),
        },
      };
      try {
        localStorage.setItem(POS_KEY, JSON.stringify(payload));
      } catch {}
    }

    function defaultPanelPositions(activeEl, passiveEl) {
      const pad = 16;
      const pw = passiveEl.offsetWidth || 220;
      const ph = passiveEl.offsetHeight || 100;
      const aw = activeEl.offsetWidth || 220;
      const ah = activeEl.offsetHeight || 100;
      passiveEl.style.left = `${Math.max(pad, window.innerWidth - pw - pad)}px`;
      passiveEl.style.top = `${Math.max(pad, window.innerHeight - ph - ah - pad - 12)}px`;
      activeEl.style.left = `${Math.max(pad, window.innerWidth - aw - pad)}px`;
      activeEl.style.top = `${Math.max(pad, window.innerHeight - ah - pad)}px`;
    }

    function applyPanelPositions(activeEl, passiveEl) {
      const saved = readPanelPositions();
      if (saved.active?.left != null && saved.active?.top != null) {
        activeEl.style.left = `${saved.active.left}px`;
        activeEl.style.top = `${saved.active.top}px`;
      }
      if (saved.passive?.left != null && saved.passive?.top != null) {
        passiveEl.style.left = `${saved.passive.left}px`;
        passiveEl.style.top = `${saved.passive.top}px`;
      }
      if (!saved.active && !saved.passive) {
        defaultPanelPositions(activeEl, passiveEl);
        savePanelPositions();
      }
    }

    function bindPanelDrag(panelEl, panelKey) {
      const handle = panelEl.querySelector(".overlay-drag-handle");
      if (!handle) return;
      handle.addEventListener("mousedown", (ev) => {
        if (ev.button !== 0) return;
        const rect = panelEl.getBoundingClientRect();
        dragState = {
          panelEl,
          offsetX: ev.clientX - rect.left,
          offsetY: ev.clientY - rect.top,
        };
        ev.preventDefault();
      });
    }

    function bindPanelDrags() {
      const active = document.querySelector(".overlay-panel--active");
      const passive = document.querySelector(".overlay-panel--passive");
      if (active) bindPanelDrag(active, "active");
      if (passive) bindPanelDrag(passive, "passive");
    }

    window.addEventListener("mousemove", (ev) => {
      if (!dragState) return;
      const { panelEl, offsetX, offsetY } = dragState;
      panelEl.style.left = `${ev.clientX - offsetX}px`;
      panelEl.style.top = `${ev.clientY - offsetY}px`;
    });

    window.addEventListener("mouseup", () => {
      if (!dragState) return;
      dragState = null;
      savePanelPositions();
    });

    function applyState(state) {
      if (!state?.html || !rootEl) return;
      const scale = Math.min(200, Math.max(50, Number(state.scale) || 100));
      const layout = state.layout === "vertical" ? "vertical" : "horizontal";
      const bg = state.popoutBg === "dark" || state.popoutBg === "chroma" ? state.popoutBg : "transparent";
      const labels = state.labels || { active: "Active Skill", passive: "Passive Skill" };
      const flow = flowClass(layout);
      const activesHtml = state.html.activesSplit || state.html.actives || "";
      const passivesHtml = state.html.passivesSplit || state.html.passives || "";

      document.body.className = `bg-${bg}${bg === "transparent" ? " bg-no-panel-bg" : ""}`;
      document.documentElement.style.setProperty("--overlay-scale", String(scale / 100));

      rootEl.innerHTML = `
        <section class="overlay-panel overlay-panel--passive">
          <span class="overlay-drag-handle">${labels.passive}</span>
          <div class="overlay-slots ${flow}">${passivesHtml}</div>
        </section>
        <section class="overlay-panel overlay-panel--active">
          <span class="overlay-drag-handle">${labels.active}</span>
          <div class="overlay-slots ${flow}">${activesHtml}</div>
        </section>`;

      const activeEl = document.querySelector(".overlay-panel--active");
      const passiveEl = document.querySelector(".overlay-panel--passive");
      if (activeEl && passiveEl) {
        requestAnimationFrame(() => {
          applyPanelPositions(activeEl, passiveEl);
          bindPanelDrags();
        });
      }
    }

    function readState() {
      try {
        const raw = localStorage.getItem(STATE_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch {
        return null;
      }
    }

    applyState(readState());
    channel?.addEventListener("message", (ev) => applyState(ev.data));
    window.addEventListener("storage", (ev) => {
      if (ev.key === STATE_KEY && ev.newValue) {
        applyState(JSON.parse(ev.newValue));
      }
    });
  </script>
</body>
</html>
