<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Build overlay</title>
  <style>
    :root {
      --overlay-scale: 1;
    }
    html, body {
      margin: 0;
      min-height: 100vh;
    }
    body {
      overflow: auto;
    }
    body.bg-transparent {
      background: transparent;
    }
    body.bg-dark {
      background: rgba(8, 12, 20, 0.94);
    }
    body.bg-chroma {
      background: #00ff00;
    }
    .overlay-root {
      padding: 0.45rem;
      display: grid;
      gap: 0.45rem;
      width: fit-content;
      max-width: 100vw;
    }
    .overlay-block {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      min-width: 0;
    }
    .overlay-block.is-stack {
      flex-direction: column;
      align-items: flex-start;
    }
    .overlay-root.is-split {
      display: block;
      padding: 0;
    }
    .overlay-root.is-group-horizontal {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: 0.65rem;
    }
    .overlay-panel {
      padding: 0.45rem 0.55rem;
      border: 1px solid rgba(110, 168, 254, 0.38);
      border-radius: 12px;
      background: rgba(8, 12, 20, 0.88);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
      width: fit-content;
      max-width: 96vw;
      display: grid;
      gap: 0.45rem;
    }
    .overlay-root.is-group-horizontal .overlay-panel {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: 0.65rem;
    }
    body.bg-transparent .overlay-panel {
      background: transparent;
      border-color: rgba(110, 168, 254, 0.28);
      box-shadow: none;
    }
    body.bg-chroma .overlay-panel {
      background: rgba(8, 12, 20, 0.82);
    }
    .overlay-root.is-split .overlay-panel {
      position: fixed;
    }
    .overlay-root.is-split .overlay-panel--active {
      bottom: 1rem;
      right: 1rem;
    }
    .overlay-root.is-split .overlay-panel--passive {
      bottom: 1rem;
      right: 1rem;
      transform: translateY(calc(-100% - 0.75rem));
    }
    .overlay-label {
      flex: 0 0 auto;
      font: 750 0.62rem/1.2 "Segoe UI", system-ui, sans-serif;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #9aa8bf;
      white-space: nowrap;
    }
    .overlay-label--active { color: #9ec5ff; }
    .overlay-label--passive { color: #8ee8bc; }
    .overlay-slots {
      display: flex;
      flex-wrap: wrap;
      gap: calc(0.28rem * var(--overlay-scale));
      min-width: 0;
    }
    .overlay-slots.is-flow-horizontal {
      flex-direction: row;
    }
    .overlay-slots.is-flow-vertical {
      flex-direction: column;
      flex-wrap: nowrap;
      align-items: center;
    }
    .build-mini-overlay-slot {
      display: grid;
      place-items: center;
    }
    .ico-wrap {
      position: relative;
      display: inline-grid;
      place-items: center;
    }
    .ico-img.is-hidden {
      display: none;
    }
    .ico-wrap.has-png .ico-sprite {
      opacity: 0;
    }
    .ico-sprite {
      position: relative;
      z-index: 0;
    }
  </style>
</head>
<body class="bg-transparent">
  <div id="overlayRoot" class="overlay-root"></div>
  <script>
    const STATE_KEY = "buildMiniOverlayState:v1";
    const channel = typeof BroadcastChannel !== "undefined" ? new BroadcastChannel("build-mini-overlay-sync") : null;
    const rootEl = document.getElementById("overlayRoot");

    function iconImgError(img) {
      let rest = [];
      try {
        rest = JSON.parse(img.dataset.fallbacks || "[]");
      } catch {}
      if (rest.length) {
        img.src = rest.shift();
        img.dataset.fallbacks = JSON.stringify(rest);
        return;
      }
      img.classList.add("is-hidden");
    }

    function iconImgLoad(img) {
      img.classList.remove("is-hidden");
      const wrap = img.parentElement;
      if (wrap) wrap.classList.add("has-png");
    }

    window.iconImgError = iconImgError;
    window.iconImgLoad = iconImgLoad;

    function flowClass(layout) {
      return layout === "vertical" ? "is-flow-vertical" : "is-flow-horizontal";
    }

    function applyState(state) {
      if (!state?.html || !rootEl) return;
      const scale = Math.min(200, Math.max(50, Number(state.scale) || 100));
      const layout = state.layout === "vertical" ? "vertical" : "horizontal";
      const split = Boolean(state.split);
      const bg = state.popoutBg === "dark" || state.popoutBg === "chroma" ? state.popoutBg : "transparent";
      const labels = state.labels || { active: "Active Skill", passive: "Passive Skill" };
      const flow = flowClass(layout);

      document.body.className = `bg-${bg}`;
      document.documentElement.style.setProperty("--overlay-scale", String(scale / 100));

      if (split) {
        rootEl.className = "overlay-root is-split";
        rootEl.innerHTML = `
          <section class="overlay-panel overlay-panel--active">
            <div class="overlay-block is-stack">
              <span class="overlay-label overlay-label--active">${labels.active}</span>
              <div class="overlay-slots ${flow}">${state.html.activesSplit || state.html.actives || ""}</div>
            </div>
          </section>
          <section class="overlay-panel overlay-panel--passive">
            <div class="overlay-block is-stack">
              <span class="overlay-label overlay-label--passive">${labels.passive}</span>
              <div class="overlay-slots ${flow}">${state.html.passivesSplit || state.html.passives || ""}</div>
            </div>
          </section>`;
        return;
      }

      const groupClass = layout === "vertical" ? "is-group-vertical" : "is-group-horizontal";
      rootEl.className = `overlay-root ${groupClass}`;
      rootEl.innerHTML = `
        <section class="overlay-panel">
          <div class="overlay-block is-stack">
            <span class="overlay-label overlay-label--active">${labels.active}</span>
            <div class="overlay-slots ${flow}">${state.html.actives || ""}</div>
          </div>
          <div class="overlay-block is-stack">
            <span class="overlay-label overlay-label--passive">${labels.passive}</span>
            <div class="overlay-slots ${flow}">${state.html.passives || ""}</div>
          </div>
        </section>`;
    }

    function readState() {
      try {
        const raw = localStorage.getItem(STATE_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch {
        return null;
      }
    }

    applyState(readState());
    channel?.addEventListener("message", (ev) => applyState(ev.data));
    window.addEventListener("storage", (ev) => {
      if (ev.key === STATE_KEY && ev.newValue) {
        applyState(JSON.parse(ev.newValue));
      }
    });
  </script>
</body>
</html>
